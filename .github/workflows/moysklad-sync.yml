name: MoySklad Daily Sync

on:
  schedule:
    # 03:00 UTC = 05:00 Київ (EEST, літо) / 06:00 (EET, зима)
    - cron: '0 3 * * *'
  workflow_dispatch:           # Manual trigger from Actions tab
    inputs:
      sync_mode:
        description: 'incremental (cursor delta) or full (re-fetch everything)'
        required: false
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full
      window_days:
        description: 'Скільки днів назад тягнути (тільки якщо start_date порожній)'
        required: false
        default: '30'
      start_date:
        description: 'Опціонально: ISO дата, з якої тягнути (наприклад 2023-01-01). Перекриває window_days.'
        required: false
        default: ''

jobs:
  sync:
    name: Fetch MoySklad → write D1 → regen dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 120         # було 25 → не вистачило для full sync з 2023-01-01
    permissions:
      contents: write          # so we can git commit + push regenerated dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl python-dotenv

      - name: Fetch from MoySklad + save xlsx + regenerate dashboard.html
        env:
          MOYSKLAD_TOKEN: ${{ secrets.MOYSKLAD_TOKEN }}
          SYNC_MODE: ${{ github.event.inputs.sync_mode || 'incremental' }}
          DATA_WINDOW_DAYS: ${{ github.event.inputs.window_days || '30' }}
          DATA_START_DATE: ${{ github.event.inputs.start_date || '' }}
        run: |
          mkdir -p data logs
          python3 moysklad_sync.py 2>&1 | tee logs/cron_$(date -u +%Y%m%d_%H%M).log

      - name: Ingest xlsx → Cloudflare D1
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          SYNC_API_KEY: ${{ secrets.SYNC_API_KEY }}
          DATA_DIR: ./data
        run: |
          python3 ingest_to_d1.py --trigger cron --window-days ${{ github.event.inputs.window_days || '30' }}

      # v2.72.2 FIX: цей step був джерелом exit 128 — race condition коли
      # vg/Pylyp пушать commits паралельно з 18-хв sync run.
      # Тепер: pull --rebase перед push + retry до 3 разів + continue-on-error
      # (бо data ВЖЕ у D1 до цього степу, commit dashboard.html — косметика).
      - name: Commit + push regenerated dashboard.html (tolerant)
        continue-on-error: true   # data sync important, dashboard commit — bonus
        run: |
          git config user.name  "snEco-sync-bot"
          git config user.email "noreply@sneco.ua"

          # Якщо dashboard.html не існує — нема чого комітити
          if [ ! -f dashboard.html ]; then
            echo "::notice::dashboard.html not present — skipping git commit (no regen needed)"
            exit 0
          fi

          git add dashboard.html
          if git diff --cached --quiet; then
            echo "::notice::No dashboard changes to commit."
            exit 0
          fi

          git commit -m "auto: dashboard refreshed $(date -u +%Y-%m-%d) via MoySklad cron"

          # Retry push до 3 разів з pull --rebase у разі rejected
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "::notice::Pushed on attempt $attempt"
              exit 0
            fi
            echo "::warning::Push rejected on attempt $attempt — pulling rebase and retrying..."
            git pull --rebase --autostash origin main || true
            sleep 2
          done

          echo "::warning::Push failed after 3 attempts — leaving for next run (data already in D1)"
          exit 0    # не fail-али step бо data ВЖЕ у D1

      - name: Sync summary
        if: always()
        run: |
          echo "::notice::MoySklad sync finished at $(date -u). Status: ${{ job.status }}"
