name: MoySklad Daily Sync

on:
  schedule:
    # 03:00 UTC = 05:00 Київ (EEST, літо) / 06:00 (EET, зима)
    - cron: '0 3 * * *'
  workflow_dispatch:           # Manual trigger from Actions tab
    inputs:
      window_days:
        description: 'How many days back to sync'
        required: false
        default: '30'

jobs:
  sync:
    name: Fetch MoySklad → write D1 → regen dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write          # so we can git commit + push regenerated dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl python-dotenv

      - name: Fetch from MoySklad + save xlsx + regenerate dashboard.html
        env:
          MOYSKLAD_TOKEN: ${{ secrets.MOYSKLAD_TOKEN }}
          DATA_WINDOW_DAYS: ${{ github.event.inputs.window_days || '30' }}
        run: |
          mkdir -p data logs
          python3 moysklad_sync.py 2>&1 | tee logs/cron_$(date -u +%Y%m%d_%H%M).log

      - name: Ingest xlsx → Cloudflare D1
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          SYNC_API_KEY: ${{ secrets.SYNC_API_KEY }}
          DATA_DIR: ./data
        run: |
          python3 ingest_to_d1.py --trigger cron --window-days ${{ github.event.inputs.window_days || '30' }}

      - name: Commit + push regenerated dashboard.html
        run: |
          git config user.name  "snEco-sync-bot"
          git config user.email "noreply@sneco.ua"
          git add dashboard.html
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "auto: dashboard refreshed $(date -u +%Y-%m-%d) via MoySklad cron"
            git push
          fi

      - name: Sync summary
        if: always()
        run: |
          echo "::notice::MoySklad sync finished at $(date -u). Status: ${{ job.status }}"
