<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>snEco — Finance Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --y:#FEBF27;--g:#96C11F;--d:#1E1E1E;--bg:#F4F4EF;--card:#fff;
  --muted:#8a8a8a;--border:#E5E5DC;--red:#E84040;--blue:#3B82F6;
  --orange:#F97316;--purple:#7209B7;
  --yf:rgba(254,191,39,.13);--gf:rgba(150,193,31,.12);--rf:rgba(232,64,64,.10);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--d);font-size:14px;min-height:100vh}

/* ─── TOPBAR ─── */
.topbar{background:var(--d);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.logo{display:flex;align-items:center;gap:10px}
.logo-box{width:32px;height:32px;background:var(--y);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:var(--d);letter-spacing:-0.5px}
.logo-text{color:#fff;font-size:15px;font-weight:700;letter-spacing:-.3px}
.logo-sub{color:rgba(255,255,255,.4);font-size:11px;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(150,193,31,.2);color:var(--g);border:1px solid rgba(150,193,31,.3)}
.badge-gray{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.1)}

/* ─── LAYOUT ─── */
.wrap{padding:20px 24px;max-width:1400px;margin:0 auto}
.empty-hero{padding:80px 20px;text-align:center;color:var(--muted)}
.empty-hero .eh-icon{font-size:60px;margin-bottom:14px;opacity:.5}
.empty-hero .eh-title{font-size:18px;font-weight:700;color:var(--d);margin-bottom:6px}
.empty-hero .eh-sub{font-size:13px;line-height:1.5}
.sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:960px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}}
@media(max-width:620px){.g4,.g3,.g2{grid-template-columns:1fr}.topbar{padding:0 12px;height:48px}.wrap{padding:12px 10px}}

/* ─── HERO HEADER ─── */
.fin-header{background:linear-gradient(135deg, #1B4332 0%, #2D6A4F 100%);color:#fff;border-radius:14px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden}
.fin-header::after{content:'';position:absolute;top:-60px;right:-60px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle, rgba(150,193,31,0.18) 0%, transparent 70%);pointer-events:none}
.fin-title{font-size:24px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px;line-height:1.2}
.fin-sub{font-size:13px;color:rgba(255,255,255,.75)}

/* ─── KPI CARDS ─── */
.kpi{background:var(--card);border-radius:12px;padding:16px 18px;border:1px solid var(--border);position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
.kpi.cy::after{background:var(--y)}
.kpi.cg::after{background:var(--g)}
.kpi.cr::after{background:var(--red)}
.kpi.cb::after{background:var(--blue)}
.kpi.co::after{background:var(--orange)}
.kpi.cp::after{background:var(--purple)}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px}
.kpi-val{font-size:22px;font-weight:800;color:var(--d);line-height:1.1}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:6px}
.kpi-delta{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;margin-top:6px}
.kpi-delta.up{background:rgba(150,193,31,.15);color:#4a7000}
.kpi-delta.down{background:rgba(232,64,64,.12);color:#a00}
.kpi-delta.flat{background:rgba(138,138,138,.13);color:#666}

/* ─── CHART CARDS ─── */
.cc{background:var(--card);border-radius:12px;padding:18px 20px;border:1px solid var(--border)}
.cc-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.cc-title{font-size:14px;font-weight:700;color:var(--d)}
.cc-sub{font-size:11px;color:var(--muted);margin-top:2px}
.chart-h220{height:220px;position:relative}
.chart-h280{height:280px;position:relative}
.chart-h320{height:320px;position:relative}

/* ─── INSIGHTS ─── */
.insight{padding:14px 18px;border-radius:10px;font-size:13px;line-height:1.55;display:flex;align-items:flex-start;gap:10px}
.insight.green{background:rgba(150,193,31,.08);color:#4a7000;border-left:3px solid var(--g)}
.insight.yellow{background:rgba(254,191,39,.08);color:#996600;border-left:3px solid var(--y)}
.insight.red{background:rgba(232,64,64,.06);color:#a00;border-left:3px solid var(--red)}
.insight.blue{background:rgba(59,130,246,.07);color:#1d5fa6;border-left:3px solid var(--blue)}
.insight-icon{font-size:18px;flex-shrink:0;margin-top:-2px}
.insights-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:620px){.insights-grid{grid-template-columns:1fr}}

/* ─── DATA TABLE ─── */
.dt{width:100%;border-collapse:collapse;font-size:13px}
.dt th{text-align:left;padding:8px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:2px solid var(--border)}
.dt td{padding:8px 12px;border-bottom:1px solid var(--border)}
.dt tr:last-child td{border:none}
.dt tr:hover td{background:#FAFAF5}
.rank{font-weight:800;color:var(--red);font-size:13px;width:28px}

/* ─── BUCKETS ─── */
.bucket-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
.bucket-pill.b0{background:rgba(150,193,31,.18);color:#4a7000}
.bucket-pill.b30{background:rgba(254,191,39,.18);color:#996600}
.bucket-pill.b60{background:rgba(249,115,22,.18);color:#c2410c}
.bucket-pill.b90{background:rgba(232,64,64,.15);color:#a00}

/* ─── QUICK ACTIONS ─── */
.act-btn{padding:6px 12px;border-radius:7px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;color:var(--d);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;text-decoration:none}
.act-btn:hover{border-color:var(--y);background:var(--yf)}
.act-btn.tel{border-color:rgba(150,193,31,.35);color:#4a7000}
.act-btn.tel:hover{background:rgba(150,193,31,.12)}
.act-btn.mail{border-color:rgba(59,130,246,.35);color:#1d5fa6}
.act-btn.mail:hover{background:rgba(59,130,246,.08)}

/* ─── EMPTY STATE ─── */
.empty-state{padding:36px 20px;text-align:center;color:var(--muted)}
.empty-state .es-icon{font-size:30px;margin-bottom:8px}
.empty-state .es-title{font-weight:600;color:#666;margin-bottom:5px;font-size:13px}
.empty-state .es-sub{font-size:12px}

/* ─── LOADER ─── */
.loader{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--y);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── FOOTER ─── */
.footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;border-top:1px solid var(--border);margin-top:20px}

/* === OTP gate === */
#dashauth-overlay{position:fixed;inset:0;background:#1E1E1E;z-index:9999;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#dashauth-overlay.is-hidden{display:none}
.dashauth-card{background:#fff;width:100%;max-width:440px;border-radius:14px;padding:36px 30px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.dashauth-logo{font-size:24px;font-weight:900;color:#FEBF27;margin-bottom:6px;letter-spacing:-0.5px;text-align:center}
.dashauth-sub{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#888;text-align:center;margin-bottom:24px}
.dashauth-icon{font-size:36px;text-align:center;margin-bottom:16px}
.dashauth-h1{font-size:18px;font-weight:800;text-align:center;color:#1E1E1E;margin-bottom:6px}
.dashauth-desc{font-size:13px;color:#666;text-align:center;line-height:1.55;margin-bottom:20px}
.dashauth-input{width:100%;padding:12px 14px;border:2px solid #E5E5DC;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.dashauth-input:focus{border-color:#FEBF27}
.dashauth-input.code{font-family:'SF Mono',Menlo,Consolas,monospace;letter-spacing:.4em;text-align:center;font-size:18px}
.dashauth-btn{width:100%;padding:13px;background:#1E1E1E;color:#fff;border:0;border-radius:8px;font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;margin-top:14px;font-family:inherit;transition:background .15s}
.dashauth-btn:hover{background:#000}
.dashauth-btn:disabled{opacity:.5;cursor:not-allowed}
.dashauth-msg{font-size:12.5px;line-height:1.5;margin-top:12px;text-align:center;min-height:18px}
.dashauth-msg.is-error{color:#DC2626}
.dashauth-msg a{color:#FEBF27;font-weight:600;text-decoration:underline}
.dashauth-back{display:block;text-align:center;margin-top:18px;font-size:12px;color:#888;text-decoration:none}
.dashauth-back:hover{color:#FEBF27}
.dashauth-session{position:fixed;top:64px;right:12px;z-index:10000;background:rgba(150,193,31,.18);color:#96C11F;border:1px solid rgba(150,193,31,.35);padding:5px 12px;border-radius:14px;font-size:11px;font-family:-apple-system,sans-serif;font-weight:600;display:flex;align-items:center;gap:8px}
.dashauth-session button{background:none;border:0;color:#96C11F;cursor:pointer;font-size:14px;padding:0;line-height:1}
body.dash-locked{overflow:hidden}
</style>
</head>
<body class="dash-locked">

<!-- ===== OTP GATE OVERLAY ===== -->
<div id="dashauth-overlay">
  <div class="dashauth-card">
    <div class="dashauth-logo">snEco</div>
    <div class="dashauth-sub">Finance Dashboard · Confidential</div>
    <div id="dashauth-stage"></div>
  </div>
</div>

<script>
(function(){
  const WORKER = 'https://sneco-auth.vg-ab6.workers.dev';
  const BLOCK = 'finance-dashboard';
  const STORAGE_KEY = 'snEco-jwt-' + BLOCK;
  const overlay = document.getElementById('dashauth-overlay');
  const stage = document.getElementById('dashauth-stage');
  let email = '';

  function unlock(token, em, exp){
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({token, email:em, exp})); } catch(e){}
    document.body.classList.remove('dash-locked');
    overlay.classList.add('is-hidden');
    showSessionBadge(em, exp);
    if (typeof window.bootFinance === 'function') window.bootFinance(token);
  }
  function showSessionBadge(em, exp){
    const b = document.createElement('div');
    b.className = 'dashauth-session';
    const totalMins = Math.max(0, Math.floor((exp*1000 - Date.now())/60000));
    const timeLabel = totalMins >= 60
      ? Math.floor(totalMins/60) + 'h ' + (totalMins%60 ? (totalMins%60) + 'm' : '')
      : totalMins + 'min';
    b.innerHTML = '✓ ' + em + ' · ' + timeLabel.trim() + ' <button title="Lock">🔒</button>';
    b.querySelector('button').onclick = () => { localStorage.removeItem(STORAGE_KEY); location.reload(); };
    document.body.appendChild(b);
  }
  async function verifyExisting(){
    let s; try { s = JSON.parse(localStorage.getItem(STORAGE_KEY)||'null'); } catch(e){}
    if (!s || !s.token || !s.exp || s.exp*1000 < Date.now()) return null;
    try {
      const r = await fetch(WORKER+'/api/session/verify', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({token: s.token, block: BLOCK})});
      const j = await r.json();
      return j.ok ? s : null;
    } catch(e) { return null; }
  }
  function renderEmail(){
    stage.innerHTML = `
      <div class="dashauth-icon">💰</div>
      <div class="dashauth-h1">Введіть email</div>
      <div class="dashauth-desc">Finance Dashboard — cash flow, AR aging, дебіторка. Якщо ваш email у whitelist — на нього надійде 6-значний код. Сесія діє 24 години.</div>
      <input class="dashauth-input" type="email" id="auth-em" placeholder="ім'я@sneco.ua" autocomplete="email" autofocus>
      <button class="dashauth-btn" id="auth-send">Надіслати код</button>
      <div class="dashauth-msg" id="auth-msg"></div>
      <a href="../" class="dashauth-back">← Каталог дашбордів</a>
    `;
    const em = document.getElementById('auth-em');
    const send = document.getElementById('auth-send');
    const msg = document.getElementById('auth-msg');
    em.addEventListener('keydown', e=>{ if(e.key==='Enter') send.click(); });
    send.onclick = async () => {
      const v = em.value.trim();
      if (!v || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) { msg.textContent='Введіть правильний email.'; msg.className='dashauth-msg is-error'; return; }
      send.disabled = true; send.textContent = 'Надсилаємо...'; msg.textContent='';
      try {
        const r = await fetch(WORKER+'/api/otp/request', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email:v, block: BLOCK})});
        if (!r.ok) {
          const j = await r.json().catch(()=>({}));
          if (j.error === 'not_in_whitelist') {
            msg.innerHTML = `❌ Цього email немає у whitelist. <a href="mailto:vg@sneco.ua?subject=Finance%20Dashboard%20whitelist">✉ Запит до vg@sneco.ua</a>`;
          } else {
            msg.textContent = 'Помилка: ' + (j.error || r.status);
          }
          msg.className='dashauth-msg is-error';
          send.disabled=false; send.textContent='Надіслати код'; return;
        }
        email = v;
        renderCode();
      } catch(e) {
        msg.textContent = 'Помилка мережі: ' + e.message;
        msg.className='dashauth-msg is-error';
        send.disabled=false; send.textContent='Надіслати код';
      }
    };
  }
  function renderCode(){
    stage.innerHTML = `
      <div class="dashauth-icon">🔢</div>
      <div class="dashauth-h1">Введіть код з листа</div>
      <div class="dashauth-desc">${email}<br>Код надіслано — перевірте пошту (включно зі спамом).</div>
      <input class="dashauth-input code" type="text" id="auth-code" inputmode="numeric" maxlength="6" placeholder="••••••" autofocus>
      <button class="dashauth-btn" id="auth-verify">Підтвердити</button>
      <div class="dashauth-msg" id="auth-msg"></div>
      <a href="#" class="dashauth-back" id="auth-back">← Інший email</a>
    `;
    const code = document.getElementById('auth-code');
    const verify = document.getElementById('auth-verify');
    const msg = document.getElementById('auth-msg');
    code.addEventListener('keydown', e=>{ if(e.key==='Enter') verify.click(); });
    document.getElementById('auth-back').onclick = e=>{ e.preventDefault(); renderEmail(); };
    verify.onclick = async () => {
      const c = code.value.trim();
      if (!/^\d{6}$/.test(c)) { msg.textContent='Код — 6 цифр.'; msg.className='dashauth-msg is-error'; return; }
      verify.disabled=true; verify.textContent='Перевіряємо...'; msg.textContent='';
      try {
        const r = await fetch(WORKER+'/api/otp/verify', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, block: BLOCK, code: c})});
        const j = await r.json();
        if (!r.ok) { msg.textContent = 'Невірний або застарілий код.'; msg.className='dashauth-msg is-error'; verify.disabled=false; verify.textContent='Підтвердити'; return; }
        unlock(j.token, j.email, j.exp);
      } catch(e) {
        msg.textContent = 'Помилка: ' + e.message; msg.className='dashauth-msg is-error';
        verify.disabled=false; verify.textContent='Підтвердити';
      }
    };
  }

  (async()=>{
    const sess = await verifyExisting();
    if (sess) { unlock(sess.token, sess.email, sess.exp); return; }
    renderEmail();
  })();
})();
</script>
<!-- ===== END OTP GATE ===== -->

<div class="wrap" id="contentWrap">
  <div class="empty-hero">
    <div class="eh-icon">💰</div>
    <div class="eh-title">Завантажуємо фінансові дані…</div>
    <div class="eh-sub"><span class="loader"></span> Виручка, оплати, рахунки з МойСклад</div>
  </div>
</div>

<div class="footer">
  snEco Finance Dashboard · МойСклад API · Оновлення: щодня 06:00
</div>

<script>
// ============================================================================
// FINANCE DASHBOARD — main logic
// ============================================================================
const WORKER = 'https://sneco-auth.vg-ab6.workers.dev';
const STORAGE_KEY = 'snEco-jwt-finance-dashboard';

// Global data caches
let allCounterparties = [];
let allDemands = [];
let allPayments = [];
let allOrders = [];
let allInvoices = [];
let allReturns = [];

let _token = null;
let _charts = {};

// Number formatters
const nf  = n => Number(Math.round(n)||0).toLocaleString('uk-UA');
const nfm = n => {
  const abs = Math.abs(n);
  if (abs >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (abs >= 1e3) return (n/1e3).toFixed(0) + 'K';
  return String(Math.round(n));
};
const df  = d => { try { return new Date(d).toLocaleDateString('uk-UA', {day:'2-digit', month:'2-digit', year:'numeric'}); } catch(e){ return d; }};

async function fetchJson(type, opts){
  const body = Object.assign({ type, limit: 50000 }, opts || {});
  const r = await fetch(WORKER + '/api/dashboard/data', {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization': 'Bearer ' + _token },
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    let txt = '';
    try { txt = await r.text(); } catch(_){}
    throw new Error(`${type}: HTTP ${r.status}${txt ? ' — ' + txt.slice(0,200) : ''}`);
  }
  const j = await r.json();
  return j.items || j.rows || j.results || [];
}

// === Boot ===
window.bootFinance = async function(token){
  _token = token;
  updateSyncBadge();

  try {
    const [cp, dem, pay, ord, inv, ret] = await Promise.all([
      fetchJson('counterparties'),
      fetchJson('demands'),
      fetchJson('payments'),
      fetchJson('orders'),
      fetchJson('invoices_out'),
      fetchJson('returns'),
    ]);
    allCounterparties = cp || [];
    allDemands = dem || [];
    allPayments = pay || [];
    allOrders = ord || [];
    allInvoices = inv || [];
    allReturns = ret || [];

    console.log(`Loaded: ${allCounterparties.length} CPs, ${allDemands.length} demands, ${allPayments.length} payments, ${allInvoices.length} invoices`);
    renderDashboard();
  } catch(e) {
    console.error('Boot error', e);
    document.getElementById('contentWrap').innerHTML = `
      <div class="empty-hero">
        <div class="eh-icon">⚠️</div>
        <div class="eh-title">Не вдалось завантажити дані</div>
        <div class="eh-sub">${escapeHtml(e.message)}<br><br>Перевір що Worker задеплоєний з блоком <code>finance-dashboard</code> і що cron sync пройшов.</div>
      </div>`;
  }
};

function renderDashboard(){
  // === Build CP lookup ===
  const cpById = {};
  const cpByName = {};
  allCounterparties.forEach(c => {
    if (c.id) cpById[c.id] = c;
    const nm = (c.name||'').trim();
    if (nm) cpByName[nm] = c;
  });
  // Match counterparty by agent_id (canonical) or agent name (fallback)
  const matchCP = (item) => (item.agent_id && cpById[item.agent_id]) || (item.agent && cpByName[(item.agent||'').trim()]) || null;

  const now = new Date();
  const today = now.toISOString().slice(0,10);
  const c30 = new Date(now.getTime() - 30*86400000).toISOString().slice(0,10);
  const c60 = new Date(now.getTime() - 60*86400000).toISOString().slice(0,10);
  const c90 = new Date(now.getTime() - 90*86400000).toISOString().slice(0,10);
  const future30 = new Date(now.getTime() + 30*86400000).toISOString().slice(0,10);

  // === Helper: detect inbound payment ===
  // МойСклад has two types: "Вхідний платіж" (paymentin) and "Вихідний платіж" (paymentout).
  // payment_type may contain "Вхідний"/"Incoming", or raw_json.meta.type === 'paymentin'.
  function isInbound(p) {
    const t = String(p.payment_type||'').toLowerCase();
    if (t.includes('вхід') || t.includes('incoming') || t.includes('paymentin')) return true;
    if (t.includes('вихід') || t.includes('outgoing') || t.includes('paymentout')) return false;
    // Fallback: try raw_json
    try {
      const raw = typeof p.raw_json === 'string' ? JSON.parse(p.raw_json) : (p.raw_json||{});
      const metaType = raw?.meta?.type || raw?.type || '';
      if (String(metaType).toLowerCase() === 'paymentin') return true;
      if (String(metaType).toLowerCase() === 'paymentout') return false;
    } catch(e) {}
    // Default: assume inbound (most relevant for revenue)
    return true;
  }

  // === SECTION 1: HERO KPIs ===
  // Revenue last 30d vs prev 30d
  const revLast30 = allDemands.filter(d => (d.ms_moment||'').slice(0,10) >= c30).reduce((a,d) => a + (d.sum_kop||0)/100, 0);
  const revPrev30 = allDemands.filter(d => {
    const dt = (d.ms_moment||'').slice(0,10);
    return dt >= c60 && dt < c30;
  }).reduce((a,d) => a + (d.sum_kop||0)/100, 0);
  const revDelta = revPrev30 > 0 ? ((revLast30 - revPrev30)/revPrev30*100) : null;

  // Cash collected (inbound payments) last 30d vs prev 30d
  const cashLast30 = allPayments.filter(p => isInbound(p) && (p.ms_moment||'').slice(0,10) >= c30).reduce((a,p) => a + (p.sum_kop||0)/100, 0);
  const cashPrev30 = allPayments.filter(p => {
    const dt = (p.ms_moment||'').slice(0,10);
    return isInbound(p) && dt >= c60 && dt < c30;
  }).reduce((a,p) => a + (p.sum_kop||0)/100, 0);
  const cashDelta = cashPrev30 > 0 ? ((cashLast30 - cashPrev30)/cashPrev30*100) : null;

  // Open invoices (sum - payed > 0)
  const openInvoices = allInvoices.filter(i => ((i.sum_kop||0) - (i.payed_sum_kop||0)) > 0);
  const openInvoicesTotal = openInvoices.reduce((a,i) => a + ((i.sum_kop||0) - (i.payed_sum_kop||0))/100, 0);

  // Overdue AR (planned date passed)
  const overdueInvoices = openInvoices.filter(i => {
    const planned = (i.payment_planned_moment||'').slice(0,10);
    return planned && planned < today;
  });
  const overdueTotal = overdueInvoices.reduce((a,i) => a + ((i.sum_kop||0) - (i.payed_sum_kop||0))/100, 0);

  // DSO — average days from invoice date to payment date
  let dso = null;
  const paidInvs = allInvoices.filter(i => (i.payed_sum_kop||0) >= (i.sum_kop||0) && i.sum_kop > 0 && i.ms_moment && i.payment_planned_moment);
  if (paidInvs.length) {
    const totalDays = paidInvs.reduce((a,i) => {
      const issued = new Date(i.ms_moment).getTime();
      const planned = new Date(i.payment_planned_moment).getTime();
      return a + Math.max(0, (planned - issued)/86400000);
    }, 0);
    dso = Math.round(totalDays / paidInvs.length);
  }

  // Forecast cash next 30d
  const forecastCash = openInvoices.filter(i => {
    const planned = (i.payment_planned_moment||'').slice(0,10);
    return planned && planned >= today && planned <= future30;
  }).reduce((a,i) => a + ((i.sum_kop||0) - (i.payed_sum_kop||0))/100, 0);

  // Active customers (unique agents in demands last 90d)
  const activeAgents = new Set();
  allDemands.filter(d => (d.ms_moment||'').slice(0,10) >= c90).forEach(d => {
    activeAgents.add(d.agent_id || d.agent || '');
  });
  const activeCount = activeAgents.size;

  // Avg invoice value
  const avgInv = allInvoices.length ? (allInvoices.reduce((a,i) => a + (i.sum_kop||0)/100, 0) / allInvoices.length) : 0;

  // === SECTION 2: Cash flow 12 months ===
  const months = [];
  for (let i=11; i>=0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push(d.toISOString().slice(0,7));
  }
  const revByMonth = {};
  const cashByMonth = {};
  months.forEach(m => { revByMonth[m] = 0; cashByMonth[m] = 0; });
  allDemands.forEach(d => {
    const ym = (d.ms_moment||'').slice(0,7);
    if (ym in revByMonth) revByMonth[ym] += (d.sum_kop||0)/100;
  });
  allPayments.forEach(p => {
    if (!isInbound(p)) return;
    const ym = (p.ms_moment||'').slice(0,7);
    if (ym in cashByMonth) cashByMonth[ym] += (p.sum_kop||0)/100;
  });

  // === SECTION 3: AR aging buckets ===
  const buckets = { b0: 0, b30: 0, b60: 0, b90: 0 };
  const bucketsCount = { b0: 0, b30: 0, b60: 0, b90: 0 };
  overdueInvoices.forEach(i => {
    const planned = new Date(i.payment_planned_moment).getTime();
    const daysOver = Math.floor((Date.now() - planned)/86400000);
    const balance = ((i.sum_kop||0) - (i.payed_sum_kop||0))/100;
    if (daysOver <= 30) { buckets.b0 += balance; bucketsCount.b0++; }
    else if (daysOver <= 60) { buckets.b30 += balance; bucketsCount.b30++; }
    else if (daysOver <= 90) { buckets.b60 += balance; bucketsCount.b60++; }
    else { buckets.b90 += balance; bucketsCount.b90++; }
  });

  // === SECTION 4: TOP-10 debtors ===
  const debtorMap = {};
  overdueInvoices.forEach(i => {
    const cp = matchCP(i);
    if (!cp) return;
    const key = cp.id || cp.name;
    const balance = ((i.sum_kop||0) - (i.payed_sum_kop||0))/100;
    const planned = new Date(i.payment_planned_moment).getTime();
    const daysOver = Math.floor((Date.now() - planned)/86400000);
    if (!debtorMap[key]) debtorMap[key] = { cp, balance: 0, maxDays: 0, count: 0 };
    debtorMap[key].balance += balance;
    debtorMap[key].count++;
    if (daysOver > debtorMap[key].maxDays) debtorMap[key].maxDays = daysOver;
  });
  const topDebtors = Object.values(debtorMap).sort((a,b) => b.balance - a.balance).slice(0, 10);

  // === SECTION 5: Upcoming payments next 30d ===
  const upcomingInvoices = openInvoices.filter(i => {
    const planned = (i.payment_planned_moment||'').slice(0,10);
    return planned && planned >= today && planned <= future30;
  }).map(i => {
    const cp = matchCP(i);
    const planned = new Date(i.payment_planned_moment);
    const daysUntil = Math.floor((planned.getTime() - Date.now())/86400000);
    return {
      date: i.payment_planned_moment,
      cpName: cp ? cp.name : (i.agent || '—'),
      amount: ((i.sum_kop||0) - (i.payed_sum_kop||0))/100,
      daysUntil,
      invName: i.name || '',
    };
  }).sort((a,b) => (a.date||'').localeCompare(b.date||''));

  // === Concentration ===
  const top1Share = (overdueTotal > 0 && topDebtors[0]) ? (topDebtors[0].balance / overdueTotal * 100) : 0;
  const debtorsOver90 = topDebtors.filter(d => d.maxDays > 90).length;
  const totalOver90 = topDebtors.filter(d => d.maxDays > 90).reduce((a,d) => a + d.balance, 0);

  // === BUILD HTML ===
  const deltaPill = (val) => {
    if (val === null) return '<span class="kpi-delta flat">— н/д</span>';
    const sign = val >= 0 ? '↑' : '↓';
    const cls = val > 1 ? 'up' : val < -1 ? 'down' : 'flat';
    return `<span class="kpi-delta ${cls}">${sign} ${Math.abs(val).toFixed(1)}%</span>`;
  };

  const html = `
    <div class="fin-header">
      <div class="fin-title">💰 Finance Dashboard</div>
      <div class="fin-sub">Cash flow · AR aging · Дебіторка · Прогноз надходжень</div>
    </div>

    <div class="g4">
      <div class="kpi cg">
        <div class="kpi-lbl">Виручка (30 днів)</div>
        <div class="kpi-val">${nfm(revLast30)} ₴</div>
        ${deltaPill(revDelta)}
      </div>
      <div class="kpi cy">
        <div class="kpi-lbl">Надходження (30 днів)</div>
        <div class="kpi-val">${nfm(cashLast30)} ₴</div>
        ${deltaPill(cashDelta)}
      </div>
      <div class="kpi ${openInvoicesTotal > 0 ? 'co' : 'cg'}">
        <div class="kpi-lbl">Відкриті рахунки</div>
        <div class="kpi-val">${nfm(openInvoicesTotal)} ₴</div>
        <div class="kpi-sub">${openInvoices.length} шт · не оплачено</div>
      </div>
      <div class="kpi ${overdueTotal > 0 ? 'cr' : 'cg'}">
        <div class="kpi-lbl">Прострочена дебіторка</div>
        <div class="kpi-val">${nfm(overdueTotal)} ₴</div>
        <div class="kpi-sub">${overdueInvoices.length} шт прострочено</div>
      </div>
    </div>

    <div class="g4" style="margin-top:14px">
      <div class="kpi cb">
        <div class="kpi-lbl">DSO — Days Sales Outstanding</div>
        <div class="kpi-val">${dso !== null ? dso + ' дн' : '—'}</div>
        <div class="kpi-sub">${paidInvs.length} оплачених рахунків</div>
      </div>
      <div class="kpi cp">
        <div class="kpi-lbl">Прогноз ₴ (30 днів)</div>
        <div class="kpi-val">${nfm(forecastCash)} ₴</div>
        <div class="kpi-sub">Очікувані надходження</div>
      </div>
      <div class="kpi cg">
        <div class="kpi-lbl">Активні клієнти</div>
        <div class="kpi-val">${nf(activeCount)}</div>
        <div class="kpi-sub">за останні 90 днів</div>
      </div>
      <div class="kpi cy">
        <div class="kpi-lbl">Avg рахунок</div>
        <div class="kpi-val">${nfm(avgInv)} ₴</div>
        <div class="kpi-sub">${nf(allInvoices.length)} рахунків загалом</div>
      </div>
    </div>

    <div class="sec">💸 Грошовий потік</div>
    <div class="cc">
      <div class="cc-head">
        <div>
          <div class="cc-title">Грошовий потік — останні 12 місяців</div>
          <div class="cc-sub">Виручка (₴) vs. фактичні надходження (₴)</div>
        </div>
      </div>
      <div class="chart-h320"><canvas id="cashFlowChart"></canvas></div>
    </div>

    <div class="sec">📊 AR aging — старіння дебіторки</div>
    <div class="g2">
      <div class="cc">
        <div class="cc-head">
          <div>
            <div class="cc-title">Розподіл прострочки</div>
            <div class="cc-sub">${overdueInvoices.length} рахунків · ${nfm(overdueTotal)} ₴ загалом</div>
          </div>
        </div>
        <div class="chart-h280"><canvas id="agingChart"></canvas></div>
      </div>
      <div class="cc">
        <div class="cc-head">
          <div>
            <div class="cc-title">Buckets — деталізація</div>
            <div class="cc-sub">Сума та кількість рахунків</div>
          </div>
        </div>
        <table class="dt">
          <thead><tr><th>Bucket</th><th style="text-align:right">Рахунків</th><th style="text-align:right">Сума ₴</th><th style="text-align:right">% борги</th></tr></thead>
          <tbody>
            <tr><td><span class="bucket-pill b0">🟢 1-30 днів</span></td><td style="text-align:right">${bucketsCount.b0}</td><td style="text-align:right;font-weight:600">${nf(buckets.b0)}</td><td style="text-align:right;color:var(--muted)">${overdueTotal > 0 ? (buckets.b0/overdueTotal*100).toFixed(1) : '0'}%</td></tr>
            <tr><td><span class="bucket-pill b30">🟡 31-60 днів</span></td><td style="text-align:right">${bucketsCount.b30}</td><td style="text-align:right;font-weight:600">${nf(buckets.b30)}</td><td style="text-align:right;color:var(--muted)">${overdueTotal > 0 ? (buckets.b30/overdueTotal*100).toFixed(1) : '0'}%</td></tr>
            <tr><td><span class="bucket-pill b60">🟠 61-90 днів</span></td><td style="text-align:right">${bucketsCount.b60}</td><td style="text-align:right;font-weight:600">${nf(buckets.b60)}</td><td style="text-align:right;color:var(--muted)">${overdueTotal > 0 ? (buckets.b60/overdueTotal*100).toFixed(1) : '0'}%</td></tr>
            <tr><td><span class="bucket-pill b90">🔴 90+ днів</span></td><td style="text-align:right">${bucketsCount.b90}</td><td style="text-align:right;font-weight:600;color:var(--red)">${nf(buckets.b90)}</td><td style="text-align:right;color:var(--red)">${overdueTotal > 0 ? (buckets.b90/overdueTotal*100).toFixed(1) : '0'}%</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="sec">📞 ТОП-10 поточних дебіторів — контакти готові</div>
    <div class="cc">
      ${topDebtors.length === 0 ? `
        <div class="empty-state">
          <div class="es-icon">🎉</div>
          <div class="es-title">Усі рахунки в строк!</div>
          <div class="es-sub">Жодного клієнта з простроченою дебіторкою</div>
        </div>
      ` : `
        <table class="dt">
          <thead>
            <tr>
              <th style="width:30px">#</th>
              <th>Контрагент</th>
              <th style="text-align:center;width:70px">Дні</th>
              <th style="text-align:right">Сума ₴</th>
              <th style="text-align:right">Рах.</th>
              <th style="text-align:right;width:230px">Action</th>
            </tr>
          </thead>
          <tbody>
            ${topDebtors.map((d,i) => {
              const c = d.cp;
              const phone = c.phone || '';
              const em = c.email || '';
              const daysClass = d.maxDays > 90 ? 'b90' : d.maxDays > 60 ? 'b60' : d.maxDays > 30 ? 'b30' : 'b0';
              return `
                <tr>
                  <td class="rank">${i+1}</td>
                  <td>
                    <div style="font-weight:600">${escapeHtml(c.name)}</div>
                    ${c.edrpou ? `<div style="font-size:11px;color:var(--muted)">ЄДРПОУ ${escapeHtml(c.edrpou)}</div>` : c.inn ? `<div style="font-size:11px;color:var(--muted)">ІНН ${escapeHtml(c.inn)}</div>` : ''}
                  </td>
                  <td style="text-align:center"><span class="bucket-pill ${daysClass}">${d.maxDays}</span></td>
                  <td style="text-align:right;font-weight:700;color:var(--red)">${nf(d.balance)}</td>
                  <td style="text-align:right;color:var(--muted)">${d.count}</td>
                  <td style="text-align:right">
                    ${phone ? `<a href="tel:${escapeAttr(phone)}" class="act-btn tel">📞 ${escapeHtml(phone)}</a>` : ''}
                    ${em ? `<a href="mailto:${escapeAttr(em)}?subject=Прострочена%20дебіторка%20${nf(d.balance)}%20%E2%82%B4" class="act-btn mail">✉</a>` : ''}
                    ${!phone && !em ? '<span style="color:var(--muted);font-size:11px">— контактів немає —</span>' : ''}
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `}
    </div>

    <div class="sec">⏳ Очікувані надходження — наступні 30 днів</div>
    <div class="cc">
      ${upcomingInvoices.length === 0 ? `
        <div class="empty-state">
          <div class="es-icon">📭</div>
          <div class="es-title">Немає запланованих надходжень</div>
          <div class="es-sub">Жоден рахунок не має planned date у наступні 30 днів</div>
        </div>
      ` : `
        <div class="cc-head" style="margin-bottom:8px">
          <div class="cc-sub">${upcomingInvoices.length} рахунків · ${nfm(upcomingInvoices.reduce((a,u) => a+u.amount, 0))} ₴ очікується</div>
        </div>
        <table class="dt">
          <thead>
            <tr>
              <th style="width:90px">Дата</th>
              <th>Контрагент</th>
              <th>Рахунок</th>
              <th style="text-align:right">Сума ₴</th>
              <th style="text-align:right;width:80px">Днів</th>
            </tr>
          </thead>
          <tbody>
            ${upcomingInvoices.slice(0, 30).map(u => `
              <tr>
                <td style="white-space:nowrap;font-weight:600">${df(u.date)}</td>
                <td>${escapeHtml(u.cpName)}</td>
                <td style="font-size:11px;color:var(--muted)">${escapeHtml(u.invName)}</td>
                <td style="text-align:right;font-weight:700">${nf(u.amount)}</td>
                <td style="text-align:right">${u.daysUntil <= 3 ? `<span class="bucket-pill b30">через ${u.daysUntil}</span>` : `<span style="color:var(--muted)">через ${u.daysUntil} дн</span>`}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        ${upcomingInvoices.length > 30 ? `<div style="text-align:center;padding:10px;color:var(--muted);font-size:12px">показано перші 30 з ${upcomingInvoices.length}</div>` : ''}
      `}
    </div>

    <div class="sec">🧠 Auto-insights</div>
    <div class="insights-grid">
      <div class="insight ${debtorsOver90 > 0 ? 'red' : 'green'}">
        <div class="insight-icon">${debtorsOver90 > 0 ? '🔴' : '✅'}</div>
        <div>
          <strong>${debtorsOver90 > 0
            ? `${debtorsOver90} клієнт${debtorsOver90 > 1 ? 'и' : ''} прострочили &gt; 90 днів`
            : 'Немає клієнтів &gt; 90 днів прострочки'}</strong>
          ${debtorsOver90 > 0
            ? `<br><span style="color:#666">Сума: ${nfm(totalOver90)} ₴ — терміново подзвонити з top-10 списку вище</span>`
            : '<br><span style="color:#666">Здоровий стан AR</span>'}
        </div>
      </div>
      <div class="insight ${dso !== null && dso > 60 ? 'red' : dso !== null && dso > 30 ? 'yellow' : 'green'}">
        <div class="insight-icon">${dso !== null && dso > 60 ? '⏰' : dso !== null && dso > 30 ? '🟡' : '✅'}</div>
        <div>
          <strong>${dso !== null
            ? (dso > 60 ? `Високий DSO: ${dso} днів` : dso > 30 ? `Середній DSO: ${dso} днів` : `Низький DSO: ${dso} днів — швидко платять`)
            : 'DSO недостатньо даних'}</strong>
          ${dso !== null
            ? `<br><span style="color:#666">Середній термін від виставлення до планової оплати</span>`
            : '<br><span style="color:#666">Потрібно більше оплачених рахунків з planned moment</span>'}
        </div>
      </div>
      <div class="insight blue">
        <div class="insight-icon">📈</div>
        <div>
          <strong>Очікуємо ${nfm(forecastCash)} ₴ надходжень у найближчі 30 днів</strong>
          <br><span style="color:#666">З ${upcomingInvoices.length} відкритих рахунків з planned date</span>
        </div>
      </div>
      <div class="insight ${top1Share > 25 ? 'yellow' : 'green'}">
        <div class="insight-icon">${top1Share > 50 ? '🎯' : top1Share > 25 ? '⚠️' : '👥'}</div>
        <div>
          <strong>${top1Share > 25
            ? `Концентрація: TOP-1 дебітор = ${top1Share.toFixed(1)}% усіх боргів`
            : 'Низька концентрація — борги розподілені'}</strong>
          ${top1Share > 25 && topDebtors[0]
            ? `<br><span style="color:#666">${escapeHtml(topDebtors[0].cp.name)} — ${nfm(topDebtors[0].balance)} ₴</span>`
            : ''}
        </div>
      </div>
    </div>
  `;

  document.getElementById('contentWrap').innerHTML = html;

  setTimeout(() => {
    const cfCtx = document.getElementById('cashFlowChart');
    if (cfCtx) {
      if (_charts.cf) _charts.cf.destroy();
      _charts.cf = new Chart(cfCtx, {
        type: 'bar',
        data: {
          labels: months,
          datasets: [
            {
              label: 'Виручка (₴)',
              data: months.map(m => revByMonth[m]),
              backgroundColor: 'rgba(254,191,39,.75)',
              borderColor: '#FEBF27',
              borderWidth: 1,
            },
            {
              label: 'Надходження (₴)',
              data: months.map(m => cashByMonth[m]),
              backgroundColor: 'rgba(150,193,31,.75)',
              borderColor: '#96C11F',
              borderWidth: 1,
            },
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: true, position: 'top' } },
          scales: { y: { ticks: { callback: v => nfm(v) + ' ₴' } } }
        }
      });
    }

    const agCtx = document.getElementById('agingChart');
    if (agCtx) {
      if (_charts.ag) _charts.ag.destroy();
      _charts.ag = new Chart(agCtx, {
        type: 'doughnut',
        data: {
          labels: ['1-30 днів', '31-60 днів', '61-90 днів', '90+ днів'],
          datasets: [{
            data: [buckets.b0, buckets.b30, buckets.b60, buckets.b90],
            backgroundColor: ['#96C11F', '#FEBF27', '#F97316', '#E84040'],
            borderWidth: 2,
            borderColor: '#fff',
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom', labels: { padding: 12, font: { size: 11 } } },
            tooltip: {
              callbacks: {
                label: (ctx) => `${ctx.label}: ${nf(ctx.parsed)} ₴`
              }
            }
          }
        }
      });
    }
  }, 50);
}

function escapeHtml(s){return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}
function escapeAttr(s){return escapeHtml(s).replace(/"/g,'&quot;');}

async function updateSyncBadge(){
  const statusEl = document.getElementById('syncStatus');
  const updateEl = document.getElementById('lastUpdate');
  try {
    const r = await fetch(WORKER + '/api/dashboard/last-sync', {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'});
    if (!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json();
    const items = j.items || [];
    const ok = items.find(x => x.status === 'success');
    if (!ok) { statusEl.textContent = '⚠ Sync не успішний'; return; }
    const d = new Date(ok.finished_at * 1000);
    const fmt = d.toLocaleString('uk-UA', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
    const ageH = Math.round((Date.now() - d.getTime()) / 36e5);
    statusEl.textContent = `✓ Sync: ${fmt}`;
    updateEl.textContent = ageH < 1 ? 'щойно' : ageH < 24 ? ageH + ' год тому' : Math.round(ageH/24) + ' дн. тому';
  } catch(e) {
    statusEl.textContent = '⚠ Sync info недоступне';
  }
}
</script>

</body>
</html>
